services:
  backend:
    build: ./backend
    container_name: farmascan-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # Hot reload in dev
      - farmascan-uploads:/app/uploads
    environment:
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./farmascan.db
      - CORS_ORIGINS=["http://localhost:4200","http://localhost:80"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: farmascan-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  farmascan-uploads:
